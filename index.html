<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Directory & Org Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 12px;
      --radius-md: 8px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      font-family: var(--font);
      background: var(--bg-main);
      color: var(--text-main);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 40;
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .brand h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.025em; }

    .status-container { display: flex; align-items: center; gap: 12px; }
    #status-badge { font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 9999px; background: var(--bg-main); color: var(--text-muted); transition: all 0.2s; }
    #status-badge.ok { background: #dcfce7; color: #166534; }
    #status-badge.err { background: #fee2e2; color: #991b1b; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat-card { background: #fff; padding: 1rem 1.5rem; display: flex; flex-direction: column; }
    .stat-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }

    .controls-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; z-index: 30; }
    .search-wrapper { flex: 1; min-width: 300px; position: relative; }
    .search-input { width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: var(--font); font-size: 0.875rem; transition: all 0.2s; background: var(--bg-main); }
    .search-input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }
    .search-icon { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

    .btn-group { display: flex; gap: 0.5rem; }
    .btn { padding: 0.625rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: #fff; color: var(--text-main); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn:hover { background: var(--bg-main); border-color: var(--text-muted); }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }

    .filter-bar { padding: 8px 1.5rem; background: var(--bg-main); border-bottom: 1px solid var(--border); display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 6px 14px; background: #fff; border: 1px solid var(--border); border-radius: 9999px; font-size: 0.75rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

    #viewport { flex: 1; position: relative; overflow: hidden; cursor: grab; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 24px 24px; }
    #viewport:active { cursor: grabbing; }
    #canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; transition: transform 0.05s linear; }
    #connector-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }

    .node { position: absolute; width: 220px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; z-index: 10; overflow: hidden; }
    .node:hover { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); transform: translateY(-2px); }
    .node-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .node-title { font-weight: 700; font-size: 0.8125rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .node-badge { background: var(--primary-light); color: var(--primary); font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 9999px; margin-left: 6px; }
    .node-arrow { font-size: 0.6rem; color: var(--text-muted); transition: transform 0.2s; margin-left: 6px; }
    .node.expanded .node-arrow { transform: rotate(180deg); }
    
    .node-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #fff; }
    .node.expanded .node-content { max-height: 300px; overflow-y: auto; padding: 8px 0; }
    
    .employee-item { padding: 6px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; }
    .employee-item:last-child { border-bottom: none; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; flex-shrink: 0; }
    .emp-info { display: flex; flex-direction: column; min-width: 0; }
    .emp-name { font-size: 0.75rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .emp-meta { font-size: 0.625rem; color: var(--text-muted); }

    .zoom-controls { position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
    .zoom-btn { width: 40px; height: 40px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow); color: var(--text-main); font-size: 1.25rem; }

    #overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; display: none; }
    #overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--primary-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="logo-icon">🏢</div>
      <h1>Corporate Directory</h1>
    </div>
    <div class="status-container">
      <span id="status-badge">Initializing...</span>
      <button class="btn" id="refresh-btn" onclick="fetchData()">Refresh</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card"><span class="stat-label">Total Employees</span><span class="stat-value" id="stat-emp">0</span></div>
    <div class="stat-card"><span class="stat-label">Departments</span><span class="stat-value" id="stat-dept">0</span></div>
    <div class="stat-card"><span class="stat-label">Org Levels</span><span class="stat-value" id="stat-depth">0</span></div>
  </div>

  <div class="controls-bar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search by name, ID or department..." oninput="handleSearch(this.value)">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="resetView()">Center View</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-chip active" onclick="setFilter('all')">All Divisions</div>
  </div>

  <div id="viewport">
    <div id="canvas">
      <svg id="connector-svg"></svg>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="handleZoom(0.1)">+</button>
      <button class="zoom-btn" onclick="handleZoom(-0.1)">−</button>
      <button class="zoom-btn" onclick="resetView()">⟲</button>
    </div>
    <div id="overlay">
      <div class="spinner"></div>
      <p id="overlay-text">Fetching data...</p>
    </div>
  </div>

  <script>
    const NODE_WIDTH = 220;
    const HORIZONTAL_GAP = 30;
    const VERTICAL_GAP = 120;
    const PADDING = 100;

    let rawEmployees = [];
    let filteredEmployees = [];
    let expandedEmployeeNodes = new Set();
    let currentFilter = 'all';
    let searchQuery = '';
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let startPan = { x: 0, y: 0 };

    async function fetchData() {
      showOverlay(true, 'Fetching organization data...');
      updateStatus('loading', 'Updating...');
      try {
        const response = await fetch('/api/employees');
        const data = await response.json();
        if (data.ok && data.employees) {
          rawEmployees = data.employees;
        } else {
          throw new Error('No data');
        }
      } catch (err) {
        console.warn('Using fallback data');
        rawEmployees = getMockData();
      }
      processData();
      buildFilters();
      render();
      resetView();
      showOverlay(false);
      updateStatus('ok', `${rawEmployees.length} Employees`);
    }

    function getMockData() {
      return [
        { id: 'E1', name: 'Alice Johnson', org: 'Corp / HQ / - / Tech / - / - / Frontend' },
        { id: 'E2', name: 'Bob Smith', org: 'Corp / HQ / Division A / - / - / - / Backend' },
        { id: 'E3', name: 'Charlie Brown', org: 'Corp / Branch / Division B / Sales / - / - / -' }
      ];
    }

    function parseOrg(org) {
      if (!org) return ['Unassigned'];
      return org.split('/').map(s => s.trim()).filter(s => s && s !== '-');
    }

    function processData() {
      filteredEmployees = rawEmployees.filter(emp => {
        const matchesSearch = !searchQuery || 
          emp.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          emp.id.toLowerCase().includes(searchQuery.toLowerCase()) ||
          (emp.org && emp.org.toLowerCase().includes(searchQuery.toLowerCase()));
        
        const parts = parseOrg(emp.org);
        const matchesFilter = currentFilter === 'all' || parts.includes(currentFilter);
        
        return matchesSearch && matchesFilter;
      });

      document.getElementById('stat-emp').textContent = filteredEmployees.length;
      const depts = new Set();
      let maxDepth = 0;
      filteredEmployees.forEach(e => {
        const parts = parseOrg(e.org);
        parts.forEach((p, i) => depts.add(parts.slice(0, i+1).join(' / ')));
        maxDepth = Math.max(maxDepth, parts.length);
      });
      document.getElementById('stat-dept').textContent = depts.size;
      document.getElementById('stat-depth').textContent = maxDepth;
    }

    function buildFilters() {
      const divisions = [...new Set(rawEmployees.map(e => {
        const parts = e.org ? e.org.split('/').map(s => s.trim()) : [];
        return parts[2] && parts[2] !== '-' ? parts[2] : null;
      }).filter(Boolean))].sort();
      
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = `<div class="filter-chip ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All Divisions</div>`;
      divisions.forEach(div => {
        const chip = document.createElement('div');
        chip.className = `filter-chip ${currentFilter === div ? 'active' : ''}`;
        chip.textContent = div;
        chip.onclick = () => setFilter(div);
        bar.appendChild(chip);
      });
    }

    function buildTree(employees) {
      const root = { id: 'root', name: 'Organization', children: new Map(), employees: [], depth: -1 };
      employees.forEach(emp => {
        const parts = parseOrg(emp.org);
        let current = root;
        parts.forEach((part, index) => {
          if (!current.children.has(part)) {
            current.children.set(part, {
              id: parts.slice(0, index + 1).join(' / '),
              name: part,
              children: new Map(),
              employees: [],
              depth: index
            });
          }
          current = current.children.get(part);
          if (index === parts.length - 1) current.employees.push(emp);
        });
      });
      return root;
    }

    function calculateLayout(node, x = 0, depth = 0) {
      const children = Array.from(node.children.values());
      let totalWidth = 0;
      const results = [];
      if (children.length === 0) {
        totalWidth = NODE_WIDTH;
      } else {
        let currentX = x;
        children.forEach(child => {
          const childLayout = calculateLayout(child, currentX, depth + 1);
          results.push(...childLayout.nodes);
          currentX += childLayout.width + HORIZONTAL_GAP;
        });
        totalWidth = currentX - x - HORIZONTAL_GAP;
      }
      const nodeX = x + (totalWidth - NODE_WIDTH) / 2;
      const currentNode = { ...node, x: nodeX, y: depth * VERTICAL_GAP };
      return { nodes: [currentNode, ...results], width: Math.max(totalWidth, NODE_WIDTH) };
    }

    function render() {
      const tree = buildTree(filteredEmployees);
      const layout = calculateLayout(tree);
      const canvas = document.getElementById('canvas');
      const svg = document.getElementById('connector-svg');
      Array.from(canvas.querySelectorAll('.node')).forEach(n => n.remove());
      svg.innerHTML = '';
      
      const nodesToRender = layout.nodes.filter(n => n.id !== 'root');
      if (nodesToRender.length === 0) return;

      let minX = Math.min(...nodesToRender.map(n => n.x));
      let maxX = Math.max(...nodesToRender.map(n => n.x + NODE_WIDTH));
      let maxY = Math.max(...nodesToRender.map(n => n.y + 400));

      const width = maxX - minX + PADDING * 2;
      const height = maxY + PADDING * 2;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);

      const offX = -minX + PADDING;
      const offY = PADDING;

      nodesToRender.forEach(node => {
        const el = document.createElement('div');
        el.className = `node ${expandedEmployeeNodes.has(node.id) ? 'expanded' : ''}`;
        el.style.left = (node.x + offX) + 'px';
        el.style.top = (node.y + offY) + 'px';
        
        const total = countAll(node);
        const hasEmployees = node.employees.length > 0;
        
        el.innerHTML = `
          <div class="node-header" onclick="toggleEmployeeList('${node.id.replace(/'/g, "\\'")}')">
            <span class="node-title">${node.name}</span>
            <span class="node-badge">${total}</span>
            ${hasEmployees ? '<span class="node-arrow">▼</span>' : ''}
          </div>
          <div class="node-content">
            ${node.employees.map(e => `
              <div class="employee-item">
                <div class="avatar">${e.name[0]}</div>
                <div class="emp-info">
                  <span class="emp-name">${e.name}</span>
                  <span class="emp-meta">${e.id}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        canvas.appendChild(el);
      });

      // Draw Straight Connectors
      nodesToRender.forEach(node => {
        node.children.forEach(child => {
          const cNode = nodesToRender.find(n => n.id === child.id);
          if (cNode) {
            const startX = node.x + offX + NODE_WIDTH / 2;
            const startY = node.y + offY + 40; // Center bottom of node header
            const endX = cNode.x + offX + NODE_WIDTH / 2;
            const endY = cNode.y + offY;
            const midY = startY + (endY - startY) / 2;
            
            // Draw a straight orthogonal line
            drawStraightLine(startX, startY, endX, endY, midY, svg);
          }
        });
      });
    }

    function drawStraightLine(x1, y1, x2, y2, midY, svg) {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      // M x1 y1 (start) -> L x1 midY (down) -> L x2 midY (horizontal) -> L x2 y2 (down to child)
      const d = `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`;
      path.setAttribute("d", d);
      path.setAttribute("stroke", "#cbd5e1");
      path.setAttribute("stroke-width", "1.5");
      path.setAttribute("fill", "none");
      svg.appendChild(path);
    }

    function countAll(node) {
      let c = node.employees.length;
      node.children.forEach(ch => c += countAll(ch));
      return c;
    }

    function toggleEmployeeList(id) {
      if (expandedEmployeeNodes.has(id)) {
        expandedEmployeeNodes.delete(id);
      } else {
        expandedEmployeeNodes.add(id);
      }
      render();
    }

    function setFilter(f) { currentFilter = f; processData(); render(); resetView(); }
    function handleSearch(v) { searchQuery = v; processData(); render(); }

    function handleZoom(d) {
      const old = scale;
      scale = Math.min(Math.max(0.1, scale + d), 2);
      const vw = viewport.clientWidth, vh = viewport.clientHeight;
      panX = vw/2 - (vw/2 - panX) * (scale / old);
      panY = vh/2 - (vh/2 - panY) * (scale / old);
      updateTransform();
    }

    function resetView() {
      const vw = viewport.clientWidth, vh = viewport.clientHeight;
      const cw = parseFloat(canvas.style.width) || vw;
      scale = Math.min(vw / cw, 1) * 0.8;
      panX = (vw - cw * scale) / 2;
      panY = 50;
      updateTransform();
    }

    function updateTransform() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }

    viewport.addEventListener('mousedown', e => {
      if (e.target.closest('.node-header') || e.target.closest('.btn')) return;
      isPanning = true; startPan = { x: e.clientX - panX, y: e.clientY - panY };
    });
    window.addEventListener('mousemove', e => { if (!isPanning) return; panX = e.clientX - startPan.x; panY = e.clientY - startPan.y; updateTransform(); });
    window.addEventListener('mouseup', () => isPanning = false);
    viewport.addEventListener('wheel', e => { e.preventDefault(); handleZoom(e.deltaY > 0 ? -0.05 : 0.05); }, { passive: false });

    function showOverlay(s, t) { document.getElementById('overlay').className = s ? 'show' : ''; document.getElementById('overlay-text').textContent = t; }
    function updateStatus(t, s) { const b = document.getElementById('status-badge'); b.textContent = s; b.className = t; }

    fetchData();
    window.addEventListener('resize', resetView);
  </script>
</body>
</html>
