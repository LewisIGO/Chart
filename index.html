<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Chart Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0f0f0e;
      --ink-2:    #3d3c38;
      --ink-3:    #7a7870;
      --paper:    #fafaf8;
      --paper-2:  #f2f1ee;
      --paper-3:  #e8e6e0;
      --accent:   #2563eb;
      --danger:   #dc2626;
      --font:     'Inter', system-ui, sans-serif;
      --mono:     'DM Mono', ui-monospace, monospace;
      --radius:   10px;
      --radius-lg:16px;
      --shadow:   0 4px 24px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.05);

      --color-text-primary:      var(--ink);
      --color-text-secondary:    var(--ink-2);
      --color-text-tertiary:     var(--ink-3);
      --color-text-danger:       var(--danger);
      --color-background-primary:   #fff;
      --color-background-secondary: var(--paper-2);
      --color-background-tertiary:  var(--paper-3);
      --color-background-danger:    #fef2f2;
      --color-border-secondary: rgba(0,0,0,.15);
      --color-border-tertiary:  rgba(0,0,0,.09);
      --color-border-danger:    rgba(220,38,38,.3);
      --border-radius-md: var(--radius);
      --border-radius-lg: var(--radius-lg);
    }

    body {
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--paper-3);
      padding: 2rem;
    }

    /* toolbar */
    #toolbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    #toolbar-title {
      font-size: 15px; font-weight: 600; color: var(--ink); flex: 1;
      display: flex; align-items: center; gap: 7px;
    }
    .logo-icon {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .btn {
      font-size: 13px; font-weight: 500; font-family: var(--font);
      padding: 6px 14px; border-radius: var(--radius);
      border: 1px solid var(--paper-3);
      background: var(--paper);
      color: var(--ink); cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      transition: background .12s;
    }
    .btn:hover { background: var(--paper-2); }
    .btn.primary {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }
    .btn.primary:hover { opacity: .85; }

    /* input section */
    .input-section { margin-bottom: 14px; }
    .hint { font-size: 12px; color: var(--ink-3); margin-bottom: 4px; }
    .hint-path { font-size: 12px; color: var(--ink-3); margin-bottom: 8px; font-family: var(--mono); }
    textarea {
      width: 100%; height: 120px;
      font-size: 12.5px; font-family: var(--mono);
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--paper-3);
      background: var(--paper-2);
      color: var(--ink); resize: vertical; line-height: 1.65;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    /* legend */
    #legend {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .litem { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-3); }
    .ldot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* chart */
    #chart-wrap {
      overflow: auto;
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
      background: var(--paper-2);
      padding: 20px;
      min-height: 220px;
      display: flex; align-items: flex-start;
    }
    #chart-empty {
      font-size: 13px; color: var(--ink-3);
      padding: 60px 0; text-align: center; width: 100%;
    }

    /* error */
    #werr {
      display: none; font-size: 13px; color: var(--danger);
      padding: 8px 12px; border-radius: var(--radius);
      background: #fef2f2; border: 1px solid rgba(220,38,38,.2);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="toolbar-title">
      <div class="logo-icon"><i class="ti ti-sitemap"></i></div>
      Org Chart Generator
    </div>
    <button class="btn" onclick="loadSample()"><i class="ti ti-wand"></i> Sample</button>
    <button class="btn" onclick="clearAll()"><i class="ti ti-trash"></i> Clear</button>
    <button class="btn primary" onclick="renderChart()"><i class="ti ti-refresh"></i> Generate</button>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="hint">One path per line — use <code style="font-family:var(--mono);font-size:11px;background:var(--paper-3);padding:1px 5px;border-radius:4px">/</code> to separate levels (up to 7)</div>
    <div class="hint-path">Name / Entity / Division / Department / Sub-dept / Team / Group</div>
    <textarea id="input-area" spellcheck="false" placeholder="Casino Plus x IGO/Casino Plus x IGO (PH)/People and Culture;
Casino Plus x IGO/Casino Plus x IGO (PH)/People and Culture/Admin;
Casino Plus x IGO/Casino Plus x IGO (PH)/People and Culture/Admin/Facilities;
Casino Plus x IGO/Casino Plus x IGO (PH)/People and Culture/Admin/Facilities/Safety Operations"></textarea>
  </div>

  <!-- Legend -->
  <div id="legend">
    <span class="litem"><span class="ldot" style="background:#8B83E0"></span>Name</span>
    <span class="litem"><span class="ldot" style="background:#1D9E75"></span>Entity</span>
    <span class="litem"><span class="ldot" style="background:#378ADD"></span>Division</span>
    <span class="litem"><span class="ldot" style="background:#D4A017"></span>Department</span>
    <span class="litem"><span class="ldot" style="background:#D85A30"></span>Sub-dept</span>
    <span class="litem"><span class="ldot" style="background:#C94F7C"></span>Team</span>
    <span class="litem"><span class="ldot" style="background:#888780"></span>Group</span>
  </div>

  <div id="werr"></div>

  <!-- Chart -->
  <div id="chart-wrap">
    <div id="chart-empty">Click <strong>Sample</strong> or type paths above, then click <strong>Generate</strong>.</div>
  </div>

</div>

<script>
const PAL=[
  {bg:'#EEEDFE',bd:'#8B83E0',tx:'#26215C'},
  {bg:'#D6F2E8',bd:'#1D9E75',tx:'#04342C'},
  {bg:'#DAEAF8',bd:'#378ADD',tx:'#042C53'},
  {bg:'#FDE8B0',bd:'#D4A017',tx:'#3A2200'},
  {bg:'#FAD8C8',bd:'#D85A30',tx:'#4A1B0C'},
  {bg:'#F5CCDC',bd:'#C94F7C',tx:'#4B1528'},
  {bg:'#E3E2DA',bd:'#888780',tx:'#2C2C2A'},
];

const NODE_H=32, ROW_GAP=50, NODE_PADX=14, FONT=12, CHAR_W=6.8, IPAD=12, MIN_W=72, MAX_C=22;
const ROW_H=NODE_H+ROW_GAP;

function lbl(n){return n.length>MAX_C?n.slice(0,MAX_C-1)+'…':n;}
function bw(n){return Math.max(MIN_W,Math.ceil(lbl(n).length*CHAR_W)+IPAD*2);}
function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildTree(lines){
  const root={name:'__root__',children:[],level:-1};
  for(const raw of lines){
    const parts=raw.split('/').map(s=>s.trim()).filter(Boolean).slice(0,7);
    if(!parts.length)continue;
    let cur=root;
    for(let i=0;i<parts.length;i++){
      let ch=cur.children.find(c=>c.name===parts[i]);
      if(!ch){ch={name:parts[i],children:[],level:i};cur.children.push(ch);}
      cur=ch;
    }
  }
  return root;
}

function layout(root){
  const nodes=[],edges=[];
  function place(node,depth,parent){
    if(node.name==='__root__'){node.children.forEach(c=>place(c,0,null));return;}
    const w=bw(node.name);
    const nd={name:node.name,level:depth,w,h:NODE_H,x:0,y:depth*ROW_H,children:[]};
    node._nd=nd; nodes.push(nd);
    if(parent){parent.children.push(nd);edges.push({p:parent,c:nd});}
    node.children.forEach(ch=>place(ch,depth+1,nd));
  }
  place(root,0,null);

  function assignX(nd,ox){
    if(!nd.children.length){nd.x=ox+nd.w/2;return ox+nd.w+NODE_PADX;}
    let cx=ox;
    for(const ch of nd.children)cx=assignX(ch,cx);
    nd.x=(nd.children[0].x+nd.children[nd.children.length-1].x)/2;
    const le=nd.x-nd.w/2;
    if(le<ox){const sh=ox-le;shift(nd,sh);}
    return Math.max(cx,nd.x+nd.w/2+NODE_PADX);
  }
  function shift(nd,dx){nd.x+=dx;nd.children.forEach(ch=>shift(ch,dx));}
  let ox=0;
  nodes.filter(n=>n.level===0).forEach(r=>{ox=assignX(r,ox);});
  return{nodes,edges};
}

function toSVG(nodes,edges){
  if(!nodes.length)return'';
  const PAD=20;
  const maxX=Math.max(...nodes.map(n=>n.x+n.w/2));
  const maxY=Math.max(...nodes.map(n=>n.y+n.h));
  const W=maxX+PAD, H=maxY+PAD;
  let o=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${-PAD} ${-PAD} ${W+PAD} ${H+PAD}" width="${W+PAD}" height="${H+PAD}" style="display:block;overflow:visible">`;

  // connectors
  const byP=new Map();
  for(const e of edges){if(!byP.has(e.p))byP.set(e.p,[]);byP.get(e.p).push(e.c);}
  const lc='rgba(0,0,0,0.18)';
  for(const[p,chs]of byP){
    const px=p.x, py=p.y+NODE_H, midY=py+ROW_GAP/2;
    if(chs.length===1){
      o+=`<line x1="${px}" y1="${py}" x2="${chs[0].x}" y2="${chs[0].y}" stroke="${lc}" stroke-width="1"/>`;
    }else{
      o+=`<line x1="${px}" y1="${py}" x2="${px}" y2="${midY}" stroke="${lc}" stroke-width="1"/>`;
      const lx=Math.min(...chs.map(c=>c.x)), rx=Math.max(...chs.map(c=>c.x));
      o+=`<line x1="${lx}" y1="${midY}" x2="${rx}" y2="${midY}" stroke="${lc}" stroke-width="1"/>`;
      chs.forEach(ch=>{o+=`<line x1="${ch.x}" y1="${midY}" x2="${ch.x}" y2="${ch.y}" stroke="${lc}" stroke-width="1"/>`;});
    }
  }

  // nodes
  for(const n of nodes){
    const c=PAL[Math.min(n.level,6)];
    const lx=n.x-n.w/2;
    o+=`<rect x="${lx}" y="${n.y}" width="${n.w}" height="${NODE_H}" rx="6" fill="${c.bg}" stroke="${c.bd}" stroke-width="0.8"/>`;
    o+=`<text x="${n.x}" y="${n.y+NODE_H/2+1}" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui,sans-serif" font-size="${FONT}" font-weight="500" fill="${c.tx}">${xe(lbl(n.name))}</text>`;
  }
  o+=`</svg>`;
  return o;
}

function renderChart(){
  const raw=document.getElementById('input-area').value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  document.getElementById('werr').style.display='none';
  if(!lines.length){showErr('Enter at least one path.');return;}
  const tree=buildTree(lines);
  if(!tree.children.length){showErr('No valid paths. Use / to separate levels.');return;}
  const{nodes,edges}=layout(tree);
  document.getElementById('chart-wrap').innerHTML=toSVG(nodes,edges);
}

function showErr(msg){const e=document.getElementById('werr');e.textContent=msg;e.style.display='block';}

function clearAll(){
  document.getElementById('input-area').value='';
  document.getElementById('chart-wrap').innerHTML='<div id="chart-empty" style="font-size:13px;color:#7a7870;padding:60px 0;text-align:center;width:100%">Click <strong>Sample</strong> or type paths above, then click <strong>Generate</strong>.</div>';
  document.getElementById('werr').style.display='none';
}

function loadSample(){
  document.getElementById('input-area').value=
`Acme Corp / Operations / Logistics / Supply Chain / Procurement / Sourcing Team / APAC Group
Acme Corp / Operations / Logistics / Supply Chain / Procurement / Sourcing Team / EMEA Group
Acme Corp / Operations / Logistics / Supply Chain / Procurement / Contracts Team / Legal Group
Acme Corp / Operations / Finance / Treasury / FX Desk / Hedging Team
Acme Corp / Technology / Engineering / Product / Mobile / iOS Team
Acme Corp / Technology / Engineering / Product / Mobile / Android Team
Acme Corp / Technology / Engineering / Platform / Infrastructure / DevOps Team
Acme Corp / Technology / Engineering / Platform / Security / AppSec Team
Acme Corp / People / HR / Talent / Recruiting / APAC Hiring Group`;
  renderChart();
}
</script>
</body>
</html>
